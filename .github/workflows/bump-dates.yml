name: Bump page dates (weekly)

on:
  schedule:
    - cron: '0 15 * * 5'    # 매주 토요일 00:00 KST (금요일 15:00 UTC)
  workflow_dispatch:        # 수동 실행

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bump dates (1주 이상 지난 페이지만)
        run: python _bump_dates.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "Auto: 페이지 날짜 + sitemap lastmod 갱신 (GitHub Actions)"
            git push
            echo "✅ 자동 갱신 push됨"
          fi
