name: IndexNow submit (manual)

# 자동 schedule 비활성화 — IndexNow 키 검증 403 이슈 (Bing/Yandex 효과 한정).
# 한국 검색은 sitemap 자동 재크롤 + scripts/daily_indexing_queue.py 수동 등록으로 충분.
# 필요 시 GitHub Actions 탭에서 수동 실행 가능.
on:
  workflow_dispatch:        # 수동 실행만

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Submit to IndexNow (Bing·Yandex 등)
        run: python _indexnow_submit.py

      - name: Note about Naver
        if: success() || failure()
        run: |
          echo ""
          echo "ℹ️  네이버는 IndexNow 미지원이지만 등록된 sitemap을 자동 재크롤"
          echo "   더 빠른 색인을 원하면 사용자가 매일 [요청] → [웹페이지 수집]에서"
          echo "   하루 50개씩 수동 등록 (scripts/daily_indexing_queue.py)"
